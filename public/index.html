<!DOCTYPE html>
<html lang="en">

<head>

  <!-- Critical Font Preload (Clash Display 800 is the LCP font) -->
  <link rel="preload" href="/fonts/ClashDisplay-Bold.woff2" as="font" type="font/woff2" crossorigin fetchpriority="high">

  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://deliyaedukacija.netlify.app/" />

  <meta property="twitter:card" content="summary_large_image" />
  <meta property="twitter:url" content="https://deliyaedukacija.netlify.app/" />
  <meta property="twitter:title" content="Deliya Edukacija" />
  <meta property="twitter:description" content="Premium frizerska edukacija - Deliya" />
  <meta property="twitter:image" content="%PUBLIC_URL%/Background_White_AC.webp" />

  <link rel="apple-touch-icon" href="%PUBLIC_URL%/Background_White_AC.webp" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <title>Deliya Edukacija</title>

  <!-- Optimization: Early LCP Preload -->
  <link rel="preload" href="/deliyapocetna.webp" as="image" fetchpriority="high">

  <style>
    /* Učitavanje tvog lokalnog fajla */
    @font-face {
      font-family: 'Clash Display';
      src: url('/fonts/ClashDisplay-Bold.woff2') format('woff2');
      font-weight: 800;
      font-display: swap;
      font-style: normal;
    }
  </style>

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Outfit:wght@400;600;800&display=swap"
    rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  </noscript>

  <!-- Critical CSS Inlining for FCP/LCP -->
  <style>
    body {
      background: #050505;
      margin: 0;
    }

    .Hero_scrollContainer__tZ5m- {
      position: relative;
      height: 400vh;
      background: #050505;
    }

    .Hero_canvasWrapper__Djk2_ {
      position: sticky;
      top: 0;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #050505;
    }

    .Hero_bgImage__Q18wm {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .Hero_mirzaImg__JOgR2 {
      width: 100%;
      height: auto;
      max-width: 864px;
    }

    /* App Shell - LCP HACK */
    .app-shell-root {
      position: relative;
      height: 100vh;
      background: #050505;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .shell-title {
      font-family: 'Clash Display', sans-serif;
      font-size: clamp(7.5rem, 20vw, 21rem);
      font-weight: 800;
      line-height: 0.88;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      text-align: center;
      margin: 0;
      user-select: none;
    }

    /* Desktop Wrappers */
    .shell-solid-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding-bottom: 12vh;
    }
    .shell-outline-wrapper {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      padding-top: 22vh;
    }

    .shell-solid {
      color: #ffffff;
      text-shadow: 0 0 100px rgba(255, 255, 255, 0.15), 0 4px 50px rgba(0, 0, 0, 0.8);
    }
    .shell-outline {
      color: transparent;
      -webkit-text-stroke: 2px rgba(255, 255, 255, 0.88);
    }

    .shell-mirza-anchor {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      height: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }
    .shell-mirza-img {
      display: block;
      height: 82%;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.8));
    }

    @media (max-width: 768px) {
      .shell-title {
        font-size: clamp(2.4rem, 10vw, 4rem);
        line-height: 1.0;
        letter-spacing: 0.01em;
        white-space: nowrap;
      }
      /* Na mobilnom wrapperi nemaju punu visinu ekrana u tvom CSS-u */
      .shell-solid-wrapper {
        position: absolute;
        top: 12vh;
        left: 0; right: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
      }
      .shell-solid {
        text-shadow: 0 0 60px rgba(255, 255, 255, 0.08), 0 4px 20px rgba(0, 0, 0, 0.9);
      }
      .shell-outline-wrapper {
        position: absolute;
        top: 55vh;
        left: 0; right: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
      }
      .shell-outline {
        -webkit-text-stroke: 1.5px rgba(255, 255, 255, 0.80);
      }
      .shell-mirza-anchor { 
        height: 90%; 
        width: 100%; 
        bottom: 0;
      }
      .shell-mirza-img { 
        height: 88%; 
        filter: drop-shadow(0 30px 60px rgba(0, 0, 0, 0.95)) drop-shadow(0 0 30px rgba(0, 0, 0, 0.8));
      }

      /* Mobile Glow Hack */
      .shell-mobile-glow {
        display: block;
        position: absolute;
        bottom: 50%;
        left: 40%;
        transform: translateX(-50%);
        width: 120vw;
        height: 100vw;
        background: radial-gradient(circle at 50% 80%, rgba(20, 94, 173, 0.55) 0%, rgba(20, 94, 173, 0.25) 35%, transparent 70%);
        filter: blur(40px);
        border-radius: 50%;
        z-index: 15;
      }
    }
  </style>
</head>

<body>
  <noscript>Deliya - Premium Frizerska Edukacija</noscript>
  <div id="root">
    <div class="app-shell-root">
      <div class="shell-mobile-glow"></div>
      <div class="shell-solid-wrapper">
        <h1 class="shell-title shell-solid">OVLADAJ</h1>
      </div>
      <div class="shell-mirza-anchor">
        <img src="/deliyapocetna.webp" class="shell-mirza-img" alt="">
      </div>
      <div class="shell-outline-wrapper">
        <h1 class="shell-title shell-outline">ZANATOM</h1>
      </div>
    </div>
  </div>
</body>

</html>
